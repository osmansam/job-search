name: Deploy to Digital Ocean

on:
  push:
    branches: ['main']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null
          ssh-keyscan -H "${{ secrets.DROPLET_IP }}" >> ~/.ssh/known_hosts

      - name: Create .env file
        run: |
          cat > .env << EOF
          PORT=5050
          MONGO_URI_BASE=${{ secrets.MONGO_URI_BASE }}
          COLLECTION_NAME=${{ secrets.COLLECTION_NAME }}
          MONGO_URI_SUFFIX=${{ secrets.MONGO_URI_SUFFIX }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          NODE_ENV=production
          EOF

      - name: Deploy to Droplet
        env:
          DROPLET_IP: ${{ secrets.DROPLET_IP }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -i ~/.ssh/id_rsa $SSH_USER@$DROPLET_IP "mkdir -p ~/job-search"

          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.github' \
            ./ $SSH_USER@$DROPLET_IP:~/job-search/

          ssh -i ~/.ssh/id_rsa $SSH_USER@$DROPLET_IP << 'ENDSSH'
            cd ~/job-search

            docker compose down || true
            docker compose build --no-cache
            docker compose up -d

            echo "=== Container Status ==="
            docker compose ps -a

            echo "=== Application Logs ==="
            docker compose logs --tail=50 app || true
          ENDSSH
